spring:
  application:
    name: bank-categorizer
  profiles:
    active: dev
  flyway:
    baseline-on-migrate: true
  datasource:
    hikari:
      connection-timeout: 3000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 20
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

management:
  endpoints:
    web:
      exposure:
        include: health
      cors:
        allowed-origins: ${app.cors.allowed-origin}
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_categorizer
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

logging:
  level:
    com.bankcategorizer: DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_categorizer_test
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN}

logging:
  level:
    com.bankcategorizer: INFO
