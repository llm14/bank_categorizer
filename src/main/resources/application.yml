spring:
  application:
    name: bank-categorizer
  profiles:
    active: dev
  flyway:
    baseline-on-migrate: true
  datasource:
    hikari:
      connection-timeout: 3000
  jpa:
    properties:
      hibernate:
        jdbc:
          batch_size: 20
  servlet:
    multipart:
      max-file-size: 15MB
      max-request-size: 15MB

server:
  tomcat:
    # Tomcat's default max-swallow-size (2MB) is well under our 15MB upload limit. When a
    # multipart upload exceeds max-file-size/max-request-size, Tomcat commits the 413 response
    # before the client has finished sending the (oversized) body; it then tries to swallow
    # (read and discard) whatever's left so the connection can be closed cleanly. If the
    # remaining unread bytes exceed max-swallow-size, Tomcat aborts the connection outright
    # instead of swallowing it - which races with the client still writing the rest of the body
    # and surfaces as a client-side connection-reset/I-O error (or a client hanging past the
    # point the 413 was actually available) rather than a clean, completed 413 exchange. Set
    # comfortably above the configured multipart limits so any realistically-oversized upload
    # (a user's file being somewhat over 15MB, not a multi-GB abusive payload) gets fully
    # swallowed and the exchange completes normally.
    max-swallow-size: 25MB

management:
  endpoints:
    web:
      exposure:
        include: health
      cors:
        allowed-origins: ${app.cors.allowed-origin}
  endpoint:
    health:
      show-details: always

---
spring:
  config:
    activate:
      on-profile: dev
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_categorizer
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

logging:
  level:
    com.bankcategorizer: DEBUG

---
spring:
  config:
    activate:
      on-profile: test
  datasource:
    url: jdbc:postgresql://localhost:5432/bank_categorizer_test
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN:http://localhost:5173}

---
spring:
  config:
    activate:
      on-profile: prod
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

app:
  cors:
    allowed-origin: ${FRONTEND_ORIGIN}

logging:
  level:
    com.bankcategorizer: INFO
