services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-bank_categorizer}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      # Host-side port is overridable: this project already has an ad-hoc
      # "bank-categorizer-db" container bound to host 5432 from local dev,
      # so compose defaults to 5433 on the host. The container-internal
      # port stays 5432 either way.
      - "${DB_HOST_PORT:-5433}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-bank_categorizer}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      # Host is the compose service name "db", resolved via the Docker
      # network - not localhost and not the host-side port mapping above.
      DB_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-bank_categorizer}
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      # CORS-allowed origin for the frontend. The `prod` profile has no
      # default (unlike dev/test), so this must be set here or Spring Boot
      # fails to start on an unresolved placeholder. Defaults to the
      # frontend's own host-mapped port below, since that's the origin a
      # browser actually loads the SPA from.
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:-http://localhost:${FRONTEND_PORT:-3000}}
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      # The runtime image (eclipse-temurin:25-jre) has neither curl nor wget,
      # so we do a real HTTP round-trip via bash's /dev/tcp instead of
      # installing an HTTP client just for this. This intentionally checks
      # for an HTTP 200 status line - not just that the TCP port is open -
      # because /actuator/health reports 503/DOWN when Postgres is
      # unreachable even though the app itself (and its port) stays up; a
      # bare TCP check would miss that entirely.
      test:
        - "CMD"
        - "bash"
        - "-c"
        - >-
          exec 3<>/dev/tcp/127.0.0.1/8080 &&
          printf 'GET /actuator/health HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 &&
          grep -q 'HTTP/1.1 200' <&3
      interval: 10s
      timeout: 5s
      retries: 5
      # Generous start_period: the app needs to boot the Spring context and
      # run Flyway migrations before /actuator/health can respond at all.
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      args:
        # Vite bakes this into the static build at BUILD time - it must be
        # the address the user's BROWSER can reach directly (the backend's
        # host-mapped port), not the internal Docker service name "app",
        # since the browser never joins the compose network.
        VITE_API_BASE_URL: http://localhost:${APP_PORT:-8080}
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-3000}:80"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--spider", "http://127.0.0.1:80/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  db_data:
