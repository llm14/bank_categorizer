# SPA-friendly server block: unknown paths fall back to index.html so
# client-side routing (React Router or similar, e.g. future FE-3+ routes)
# works on hard refresh/deep links instead of 404ing at the Nginx layer.
server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
